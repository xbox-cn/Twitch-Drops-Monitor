name: Twitch Monitor

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Run monitor
        env:
          TWITCH_COOKIES: ${{ secrets.TWITCH_COOKIES }}
        run: python twitch-monitor.py
