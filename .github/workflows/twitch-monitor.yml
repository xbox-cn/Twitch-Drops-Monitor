name: Twitch Monitor

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Run monitor
        env:
          TWITCH_COOKIES: ${{ secrets.TWITCH_COOKIES }}
        run: python twitch-monitor.py

      - name: Commit seen_drops.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f seen_drops.json ]; then
            git add seen_drops.json
            if git diff --cached --quiet; then
              echo "No changes to seen_drops.json"
            else
              git commit -m "update seen_drops.json"
              git push
            fi
          else
            echo "seen_drops.json not created (no drops data)"
          fi

      - name: Notify new drops
        if: hashFiles('new_drops.txt') != ''
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
          NOTIFY_AUTH: ${{ secrets.NOTIFY_AUTH }}
          NOTIFY_GROUP: ${{ secrets.NOTIFY_GROUP }}
        run: |
          MSG=$(cat new_drops.txt)
          curl -s -X POST "${NOTIFY_URL}" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${NOTIFY_AUTH}" \
            -d "{\"message_type\":\"group\",\"group_id\":\"${NOTIFY_GROUP}\",\"message\":\"${MSG}\"}"
